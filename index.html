<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>AnF Labs</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      background-color: #0a0a0a;
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      font-family: sans-serif;
    }

    .container {
      display: flex;
      align-items: center;
      justify-content: center;
      width: 100%;
      padding: 20px;
    }

    .logo-img {
      width: 100%;
      max-width: 500px;
      height: auto;
      display: block;
    }

    @media (max-width: 600px) {
      .logo-img {
        max-width: 90vw;
      }
    }
  </style>
</head>
<body>
  <div class="container">
    <img
      src="AnFLabs.png"
      alt="ANF Labs - We Build Digital Experiences"
      class="logo-img"
    />
  </div>
</body>
</html>
